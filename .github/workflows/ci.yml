name: CI

on:
  push:
    branches: [main, nightly]
  pull_request:
    branches: [main, nightly]

jobs:
  build:
    name: Lint, type-check & build
    runs-on: ubuntu-latest
    env:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ vars.TURBO_TEAM }}

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm turbo lint

      - name: Type check
        run: pnpm turbo check-types

      - name: Build
        run: pnpm turbo build
        env:
          DATABASE_URL: postgresql://noop:noop@noop/noop
          BLOB_READ_WRITE_TOKEN: vercelblob_rw_noop

  migrate:
    name: Run migrations
    runs-on: ubuntu-latest
    # Run on PRs so migrations are validated before merge (idempotent — safe to re-run)
    if: github.event_name == 'pull_request'

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Migrate (production)
        if: github.base_ref == 'main'
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "::warning::PRODUCTION_DATABASE_URL secret not set — skipping production migration"
            exit 0
          fi
          pnpm --filter @scmascotas/db db:migrate
        env:
          DATABASE_URL: ${{ secrets.PROD_DATABASE_URL }}

      - name: Migrate (nightly)
        if: github.base_ref == 'nightly'
        run: pnpm --filter @scmascotas/db db:migrate
        env:
          DATABASE_URL: ${{ secrets.NIGHTLY_DATABASE_URL }}
